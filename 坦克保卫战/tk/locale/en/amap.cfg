world_name_info_1=Classic map with mountainous terrain, treasure spawns 1.5x more frequently than other maps, and damage is not reduced by biters.
world_name_info_2=Main world features 4 planetary terrains simultaneously, starting base contains 4x 1M ore patches,\n and outdoor assemblers spawn 2x more frequently than other maps.
world_name_info_3=Island map, advantageous for defense. Placing vehicles next to water upgrades them to fishing boats.\n[Island System]\nThe map has 5 types of islands: Military Island, Industrial Island, Resource Island, Technology Island, Construction Island.\n- Buy Islands: Spend coins to purchase islands, islands automatically produce items and gain coins and experience based on investment ratio\n- Upgrade Islands: Spend coins to upgrade islands, increase investment and improve production efficiency and rewards\n- Island Rotation: Islands spawn in the order Military→Industrial→Resource→Technology→Construction, ensuring each island type is evenly distributed
world_name_info_6=Massive experience and gold bonuses, large amounts of EXP and gold awarded every 25 waves,\n gain one talent every 15 levels, vehicle interior space is 2x larger than other worlds and includes a linked chest.\n All assemblers are automatically enabled at start. Extremely difficult to build, fierce biter attacks.
world_name_info_7=Drive spider through 5 major planetary zones to escape biter pursuit, start with spider instead of rocket silo, each player has 1 linked chest.\n Supply points appear at regular intervals, use vehicles to travel between main world and other dimensions.
world_name_info_8=Every 90 minutes, you and your base are teleported to another planet, start with spider instead of rocket silo, limited map size, all shop levels unlocked at start. Biter nests on this map continuously regenerate.\n Use vehicles to travel between main world and other dimensions.
world_name_info_9=Biters only attack from above and build forts to assault your base. All ores generate regularly below the rocket silo, while biters occupy all outdoor resources that you must reclaim!\n Note: Biters on this map launch nuclear missiles to attack rocket silos.
world_name_info_10=Command your army, increase our morale through technology research to resist Cao Caos forces. Weaken enemy attacks by destroying enemy barracks.\n Cao Caos main forces only attack from above, but sometimes build barracks behind us.
world_name_info_11=Highly developed city with complete defense line and energy network system. Starts with defenses. When energy network is active, laser turrets have infinite damage and power, and wont lose health. Autonomous heavy artillery defense system automatically charges and destroys enemy fortresses. Recycler can convert any items into energy for the energy network!
world_name_info_12=You have been forced into a desperate situation surrounded by water on three sides by the bugs, erupting with amazing fighting will. In this map, you start with +1 talent, and can automatically research technology by killing bugs. After discovering the port (researching yellow science), you can unlock new planet terrain.

