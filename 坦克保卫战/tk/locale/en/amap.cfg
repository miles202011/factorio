map_info_main_caption= Tank Defense Battle
map_info_sub_caption= A Survival Challenge Across Nine Different Dimensions
map_info_text= Map Author: itam\n Community & Support: QQ Group 701077913 \n \n Tank Defense Battle - Practical Guide\n==================\n\n[Core Mechanics]\nFailure Condition: When all players vehicles are destroyed, the game fails! Upon death, you will automatically teleport to your vehicle.\n\nMission Objectives:\nThe ultimate goal is to conquer all 8 worlds (reach 3500 waves)!\n\n\n[World Features]\nWorld 1 [Valley]: Mountainous terrain, 1.5x treasure spawn rate, bug damage does not diminish\nWorld 2 [Four Seasons]: 4 planetary terrain types exist simultaneously, initial 4x 1M ore patches, 2x wild assembler spawn rate\nWorld 3 [Water World]: Island map, vehicles placed beside deep water automatically become fishing boats, harvest 2 fish every 30 seconds\n[Island System]\nThe map has 5 types of islands: Military Island, Industrial Island, Resource Island, Technology Island, Construction Island.\n- Buy Islands: Spend coins to purchase islands, islands automatically produce items and gain coins and experience based on investment ratio\n- Upgrade Islands: Spend coins to upgrade islands, increase investment and improve production efficiency and rewards\n- Island Rotation: Islands spawn in the order Military→Industrial→Resource→Technology→Construction, ensuring each island type is evenly distributed\nWorld 6 [Imperial Arena]: Every 25 waves survived rewards 5K gold + 200 XP, 2x vehicle interior space, contains 1 linked chest, all assemblers auto-activated at start\nWorld 7 [Dimension Escape]: Drive spider through 5 main planetary regions, starts with spider, supply points along the way\nWorld 8 [Dimensional Space]: All players transported to a new planet every 45 minutes, starts with spider, limited map size, all shop levels unlocked at start, bug nests continuously respawn\nWorld 9 [Yanmen Pass]: Bugs attack only from above and build fortresses, will launch nuclear missiles at rocket silos, occupy all wild resources\nWorld 10 [Battle of Red Cliffs]: Command your army, increase combat strength through technology research, destroy enemy barracks to weaken attacks\nWorld 11 [Lost City]: Has complete defense line and energy network system. Starts with defenses. When energy network is active, laser turrets have infinite damage and power, and wont lose health. Autonomous heavy artillery defense system automatically charges and destroys enemy fortresses. Recycler can convert any items into energy for the energy network!\nWorld 12 [Desperate Survival]: Forced into a desperate situation surrounded by water on three sides by bugs, erupting with amazing fighting will. Start with +1 talent, and can automatically research technology by killing bugs. After discovering the port (researching yellow science), you can unlock new planet terrain.\n\n\n[Wild Assembler System]\nRandom assemblers spawn in the wild, capture them to get free resources!\n\nActivation Method:\nSurround with any 10 buildings\n- Activated assemblers automatically produce items\n- Assemblers have different levels and types, producing different items\n- Assemblers can level up by gaining experience from producing items\n\nImportant Note: Bugs will destroy all wild assemblers at wave 1000!\n\n\n[Vehicle Interior Space Guide]\nThere are two important chests inside the vehicle:\nBlue chest: Transfer items from vehicle backpack to vehicle\nRed chest: Transfer items from vehicle to vehicle backpack\n\n[Vehicle Purchase Functions]\nYou can purchase the following items inside the vehicle:\n- Buy Minerals: Spend 10K gold to generate minerals near your vehicle! First purchase is free!\n- Buy Experience: Spend 5K gold to buy 1000 experience points!\n- Pause Bugs: Spend gold to pause bug attacks for 15 minutes and switch bug attack targets!\n\nTip: You can also perform landfill operations inside the vehicle!\n\n\n[World Bonus System]\nWhen you reach 1500 waves in a world, you will unlock permanent bonuses for that world!\n- Unlock bonuses at 1500 waves\n- Bonus coefficient increases every 500 waves\n- Bonus effects strengthen as waves increase\n\n\n[Talent and Class Selection]\nChoosing the right class at the start is crucial!\n\nWarrior (☆☆☆ difficulty)\n- High stat growth, area damage, high health\n- Features: High melee damage, strong drone combat power, suitable for beginners\n\nMage (☆☆☆☆☆ difficulty)\n- Has powerful growable skills and summons\n- Features: Strongest in late game, but requires higher game understanding\n\nBuilder (☆ difficulty)\n- Unique economic bonuses and technology research advantages\n- Features: Fast building, good at development, suitable for players who like management\n\nTalent Selection Advice: Prioritize talents that match your class, and pay attention to synergy effects between talents!\n\n\n[Main Shop Functions]\nThe main shop is an important way to increase combat power. Spend gold to purchase the following functions:\n- Weaken Bug Damage: Reduce bug damage to our buildings and vehicles\n- Increase Our Damage: Enhance output of all damage types\n- Upgrade Bug Nest Build Limit: Increase number of bug nests\n- Upgrade Sandworm Build Limit: Increase number of sandworms\n- Increase Mining Machine Capacity: Increase output efficiency of all mining machines\n- Buy Mine Limit: Increase number of mines that can be placed\n- Pause Wave Defense: Spend gold to pause bug attacks for 15 minutes\n- Other Functions: Upgrade walls, turrets, friendly bugs, etc.\n\n\n[RPG Magic Skill Casting Guide]\nWhen your magic attribute reaches a certain level, you can consume raw fish to cast magic skills!\n\nCasting Method:\n1. Ensure your magic attribute is high enough\n2. Prepare raw fish in your backpack (raw fish is the casting medium)\n3. Open RPG interface (click fish button)\n4. Select the skill to use from the dropdown\n5. Click cast to consume raw fish and release the skill\n\nRecommended Skills:\n- Area Repair: Repair all buildings in the area\n- Chain Lightning: Chain attack multiple enemies\n- Invincible Turret: Summon powerful defense tower\n- Return to Base: Quickly return to vehicle location\n- Defense Drone: Summon drone to assist in combat\n- Insect Special Forces: Summon bugs to fight for you\n\nTip: Some talents can enhance your casting ability or reduce mana cost!\n\n\n[Resource Development Advice]\n- Capturing wild assemblers is key to obtaining advanced equipment\n- Upgrade walls, turrets, friendly bugs and other combat power in the main market\n- Increase mining machine capacity to let resources flow\n- Remember to go to the wild to find treasures and shops\n\nCommander, wish you create a legend on the alien battlefield!\n\n

