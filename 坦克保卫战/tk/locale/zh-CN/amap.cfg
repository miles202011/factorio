world_name_info_1=旅程的起点，来自五年前的经典地图，地形以山脉为主，其宝藏出现频率是其他地图的1.5倍,且不会被虫子降低伤害。
world_name_info_2=主世界同时拥有4个星球地形，初始基地内有4个1M的大矿，\n同时野外组装机出现频率是其他地图的2倍。
world_name_info_3=岛屿地图，四面环水，利于防守。将汽车布置于水旁边可将汽车升级为捕鱼船。\n【岛屿系统】\n地图上有5种类型的岛屿：军事岛、工业岛、资源岛、科技岛、建筑岛。\n-购买岛屿：花费金币购买岛屿，岛屿会自动生产物品并根据投资比例获得金币和经验\n-升级岛屿：花费金币升级岛屿，增加投资并提高生产效率和收益\n-岛屿循环：岛屿按照军事→工业→资源→科技→建筑的顺序循环生成，确保每种岛屿平均分布
world_name_info_6=防守极其疯狂进攻的虫子，拥有海量经验和金币加成，每25波都会送大量经验和金币，\n同时每15级就能获得一次天赋，汽车内空间是其他世界的2倍并且附带关联箱。\n所有组装机开局就自动启用。但极难建设，虫子进攻凶猛。
world_name_info_7=驾驶蜘蛛穿越5大星球区域躲避虫子追杀，以蜘蛛开局而不是火箭发射井，每个玩家都拥有1个关联箱,主世界带有多个提供无限电力的蓄电池。\n每隔一段距离都会有个补给点，通过放汽车以在主世界和异世界穿越。
world_name_info_8=每90分钟,你和你的基地会被传送到另一个星球，以蜘蛛开局而不是火箭发射井，受限的地图大小，开局就解锁所有商店等级，主世界带有一个提供无限电力的蓄电池。。该地图的虫巢会不断再生。\n通过放汽车以在主世界和异世界穿越。
world_name_info_9=虫子的大军想要通过这个关口，竭尽所能守住他！在关口被突破前虫子只会从上方进攻，城内每隔200米就有非常规律的矿物，非常利于建设。\n但是注意：该地图的虫子会通过发射核弹攻击火箭发射井。
world_name_info_10=统帅你的军队，通过研究科技增加我方军队士气，抵御曹军的进攻。通过击败敌军兵营削弱敌方进攻强度。\n曹军主力只会从上方进攻，但有时也会在我们后面建造军营。
world_name_info_11=你们找到了一座失落之城，这里拥有完善的完善的防线和能量网系统。开局自带防线。能量网有效时，激光塔拥有无限伤害和无限电力，且不会掉血。自主重炮防御系统会自动充能摧毁敌方堡垒。回收箱可以把任何物品转化为能量网中的能量！
world_name_info_12=你们被虫子逼入了三面环水的绝境，爆发了惊人的战斗意志，此地图中开局天赋+1，并且能够通过击杀虫子自动研究科技。在发现港口（研究黄瓶子科技），可解锁新星球地形。


