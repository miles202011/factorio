[amap]
map_info_main_caption=坦克保卫战
map_info_sub_caption=一场跨越九个异次元的生存挑战
map_info_text=地图作者：itam\n交流与支持：QQ群701077913\n【核心机制】\n失败条件：当所有玩家的载具都被摧毁时，游戏失败！死亡时会自动传送到载具旁边。\n任务目标：终极目标是征服全部8个世界(达到3500波)！\n\n【世界特性】\n世界1【山谷】：山地地形，宝藏刷新率1.5倍，虫子伤害不衰减\n世界2【四季】：4种地形的行星同时存在，初始4个100万矿石矿脉，野外组装机刷新率2倍\n世界3【水世界】：岛屿地图，载具放置在深水边自动变成捕鱼船，每30秒收获2条鱼\n【岛屿系统】\n地图上有5种类型的岛屿：军事岛、工业岛、资源岛、科技岛、建筑岛。\n-购买岛屿：花费金币购买岛屿，岛屿会自动生产物品并根据投资比例获得金币和经验\n-升级岛屿：花费金币升级岛屿，增加投资并提高生产效率和收益\n-岛屿循环：岛屿按照军事→工业→资源→科技→建筑的顺序循环生成，确保每种岛屿平均分布\n世界6【帝国竞技场】：每存活25波奖励5K金币+200经验，载具内部空间2倍，含1个链接箱子，所有组装机开局自动激活\n世界7【维度逃脱】：驾驶蜘蛛穿越5个主要行星区域，开局自带蜘蛛，沿途有补给点\n世界8【维度空间】：每45分钟全员传送到新星球，开局自带蜘蛛，地图有限，所有商店等级开局解锁，虫巢持续刷新\n世界9【雁门关】：虫子只从上方进攻并建造堡垒，会向火箭发射井发射核弹，占领所有野外资源\n世界10【赤壁之战】：指挥你的军队，通过科技研究提升战斗力，摧毁敌方兵营削弱攻击\n世界11【失落之城】：拥有完善的防线和能量网系统，开局自带防线。能量网有效时，激光塔拥有无限伤害和无限电力，且不会掉血。自主重炮防御系统会自动充能摧毁敌方堡垒。回收箱可以把任何物品转化为能量网中的能量！\n世界12【绝境求生】：被虫子逼入三面环水的绝境，爆发惊人的战斗意志。开局天赋+1，通过击杀虫子自动研究科技。发现港口（研究黄瓶子科技）后，可解锁新星球地形。\n\n【野外组装机系统】\n地图上会随机生成组装机，占领后可免费提供资源！\n激活方法：\n用任何10个建筑物围住\n-激活后组装机开始自动生产物品\n-组装机有不同等级和类型，生产不同物品\n-组装机可以通过生产物品获得经验来升级\n重要提示：虫子在1000波的时候会摧毁所有野外组装机！\n\n【载具内部空间使用指南】\n载具内有两个重要箱子：\n蓝箱子：将车背包的物品转移到车内\n红箱子：将车内物品转移到车外\n【载具内购买功能】\n在载具内可以购买以下物品：\n-购买矿物：花费10K金币在载具附近生成矿物！首次购买免费！\n-购买经验：花费5K金币，购买1000点经验！\n-暂停虫子：花费金币暂停虫子进攻15分钟，并切换虫子攻击目标！\n提示：载具内还可以进行填海操作！\n\n【世界加成系统】\n当你在某个世界达到1500波后，将解锁该世界的永久加成！\n-达到1500波解锁加成\n-每隔500波加成系数提升\n-加成效果随波次增加而增强\n\n【天赋与职业选择】\n开局选择合适的职业至关重要！\n战士（☆☆☆难度）\n-高属性成长，范围伤害，高生命值\n-特点：近战伤害高，无人机战斗力强，适合新手\n法师（☆☆☆☆☆难度）\n-拥有可成长的强大技能和召唤物\n-特点：后期最强，但需要较高游戏理解\n建造者（☆难度）\n-独特的经济加成和科技研发优势\n-特点：快速建造，擅长发展，适合喜欢经营的玩家\n选天赋建议：优先选择与职业相匹配的天赋，并注意天赋之间的联动效果！\n\n【主商店功能介绍】\n主商店是提升战斗力的重要途径，消耗金币可购买以下功能：\n-削弱虫子伤害：减少虫子对我方建筑和载具的伤害\n-提升我方伤害：增强所有伤害类型的输出\n-升级虫巢建设上限：增加虫巢数量\n-升级沙虫建设上限：增加沙虫数量\n-提升采矿机产能：增加所有采矿机的产出效率\n-购买地雷上限：增加可放置的地雷数量\n-暂停波防：花费金币暂停虫子进攻15分钟\n-其他功能：升级城墙、炮塔、友军虫子等\n\n【RPG魔法技能释放指南】\n当你的魔法属性达到一定等级后，可以消耗生鱼来施放魔法技能！\n释放方法：\n1.确保你的魔法属性足够高\n2.背包里准备生鱼（生鱼是施法媒介）\n3.打开RPG界面（点击鱼按钮）\n4.从下拉框选择要使用的技能\n5.点击施放即可消耗生鱼释放技能\n常用技能推荐：\n-范围修理：修复周围所有建筑\n-闪电链：连锁攻击多个敌人\n-无敌炮塔：召唤强力防御塔\n-回城：快速返回载具位置\n-防御无人机：召唤无人机协助战斗\n-虫族特种部队：召唤虫子为你而战\n提示：某些天赋可以增强你的施法能力或减少蓝耗！\n\n【资源发展建议】\n-占领野外组装机是获取高级装备的关键\n-在主市场升级城墙、炮塔、友军虫子等战斗力\n-提升采矿机产能，让资源滚滚而来\n-记得去野外寻找宝藏和商店\n指挥官，祝你在异星战场上创造传奇！\n

