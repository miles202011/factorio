description=Velkommen til Factorio frittspill. Oppgaven din er å skyte opp en rakett inn i verdensrommet. Du må forske på avanserte teknologier for å låse opp rakettsiloen. Start smått og skap større og større fabrikker med automasjon, men pass deg for lokal fauna, som muligens ikke er like fornøyd med ditt nærvær.
description-space-age=Oppgaven din er å sende ut en multistjerne plattform. Du må forske på avansert teknologi for å låse opp rakettsiloen og oppdage andre planeter. Start smått, og arbeid med automatisering, bygg en pålitelig base og kom i gang for å nå stjernene. Beskytt deg selv fra de naturlig arter, da de kanskje ikke setter pris på ditt nærvær.\n[font=default-bold]Dette er den tiltenkte måten å spille Factorio: Verdensrom alderen.[/font]
msg-intro=Velkommen til Factorio frispill. Oppgaven din er å skyte opp en rakett inn i verdensrommet. Du må forske på avanserte teknologier for å låse opp rakettsiloen. Start smått og skap større og større fabrikker med automasjon, men pass deg for lokal fauna, som muligens ikke er like fornøyd med ditt nærvær.
msg-intro-space-age=Velkommen til Factorio: Verdensromrom Alderens Fritspill. Oppgaven din er å sende en plattform. Der du må forske på avansert teknologi for å låse opp rakettsiloen og oppdage andre planeter. Start lit av gangen, og arbeid med automatisering, bygg en pålitelig base some klarer seg selv. Og kom i gang med å utforskes planeter. Beskytt deg selv fra de naturlig arter, da de kanskje ikke setter pris på ditt nærvær.
scenario-name=Frittspill
scenario-name-space-age=Frittspill (Verdensrom Alderen)
