      openModal("QQ群 1101554578 · 扫码加群", `<img class="qr" src="ddz_qr.png" alt="QQ群二维码">`, 360);
    }

    function modalDiscordQr() {
      openModal("Discord · 扫码加入", `<img class="qr" src="ddz_discord_qr.png" alt="Discord二维码">
        <div class="muted" style="margin-top:8px">https://discord.gg/4DwTVjDCJ</div>`, 360);
    }

    function addHuman() {
      const id = state.nextPlayerId++;
      state.players.push({id, name:`玩家${id}`});
      currentPlayer = id;
      saveAndRender();
    }

    function saveFeedback() {
      const text = $("feedbackText")?.value.trim();
      if (!text) return;
      state.feedback.push({player:pname(currentPlayer), text, time:new Date().toLocaleString()});
      saveState();
      modalAbout();
      toast("反馈已保存");
    }

    function deleteFeedback(i) {
      const fb = state.feedback[i];
      if (!fb || fb.player !== pname(currentPlayer)) return;
      state.feedback.splice(i, 1);
      saveState();
      modalAbout();
    }

    function exportQqQrSvg() {
      const a = document.createElement("a");
      a.href = "ddz_qr.svg";
      a.download = "ddz_qq_qr.svg";
      document.body.appendChild(a);
      a.click();
      a.remove();
      toast("已导出QQ群二维码SVG图片");
    }

    function exportDiscordQrPng() {
      const a = document.createElement("a");
      a.href = "ddz_discord_qr.png";
      a.download = "ddz_discord_qr.png";
      document.body.appendChild(a);
      a.click();
      a.remove();
      toast("已导出Discord二维码图片");
    }

    function exportFeedback() {
      if (!state.feedback.length) {
        toast("暂无反馈可导出");
        return;
      }
      const lines = [
        "斗地主反馈导出",
        "导出玩家：" + pname(currentPlayer),
        "反馈数量：" + state.feedback.length,
        ""
      ];
      state.feedback.forEach((fb, i) => {
        lines.push(`[${i + 1}] ${fb.player || "未知玩家"}  ${fb.time || "--"}`);
        lines.push(fb.text || "");
        lines.push("");
      });
      const blob = new Blob([lines.join("\n")], {type:"text/plain;charset=utf-8"});
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = "ddz_feedback.txt";
      document.body.appendChild(a);
      a.click();
      URL.revokeObjectURL(a.href);
      a.remove();
      toast("反馈已导出");
    }

    function saveAndRender() {
      saveState();
      render();
    }

    function toast(text) {
      $("toast").textContent = text;
      $("toast").classList.add("show");
      setTimeout(() => $("toast").classList.remove("show"), 1400);
    }

    function soundButtonHtml() {
      return `<button class="factorio-button" data-action="soundToggle">${state.soundEnabled ? "声音开" : "声音关"}</button>`;
    }

    function playPreviewSound(id) {
      if (!state.soundEnabled) {
        toast("声音已关闭");
        return;
      }
      const AC = window.AudioContext || window.webkitAudioContext;
      if (!AC) {
        toast("当前浏览器不支持试听");
        return;
      }
      const ctx = playPreviewSound.ctx ||= new AC();
      const now = ctx.currentTime;
      const gain = ctx.createGain();
      gain.connect(ctx.destination);
      gain.gain.setValueAtTime(0.0001, now);
      gain.gain.exponentialRampToValueAtTime(0.08, now + 0.01);
      gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.22);
      const osc = ctx.createOscillator();
      const specialFreq = {
        gui_click:520, inventory_click:620, smart_pipette:880, cannot_build:180,
        new_objective:740, drop_item:420, list_box_click:300, confirm:680,
        item_spawned:560, research_completed:820, build_large:120, build_huge:90,
        gui_switch:470, alert_destroyed:220, game_won:900, game_lost:160,
        entity_settings_pasted:640
      };
      let hash = 0;
      for (const ch of id) hash = (hash + ch.charCodeAt(0) * 17) % 900;
      const freq = specialFreq[id] || (180 + hash);
      osc.type = id.includes("build") || id.includes("deconstruct") || id === "alert_destroyed" ? "sawtooth" : "triangle";
      osc.frequency.setValueAtTime(freq, now);
      if (id === "build_huge") osc.frequency.exponentialRampToValueAtTime(45, now + 0.2);
      if (id === "game_won") osc.frequency.exponentialRampToValueAtTime(1200, now + 0.18);
      if (id === "game_lost") osc.frequency.exponentialRampToValueAtTime(90, now + 0.18);
      osc.connect(gain);
      osc.start(now);
      osc.stop(now + 0.24);
    }

    document.body.addEventListener("click", e => {
      const btn = e.target.closest("[data-action]");
      if (!btn) return;
      const action = btn.dataset.action;
      if (action === "closeMain") { $("app").innerHTML = ""; return; }
      if (action === "modalClose") return closeModal();
      if (action === "newTable") return newTable();
      if (action.startsWith("join:")) return joinTable(Number(action.split(":")[1]));
      if (action.startsWith("watch:")) return watchTable(Number(action.split(":")[1]));
      if (action === "watchClose") return closeWatch();
      if (action === "ready") return ready();
      if (action === "addAi") return addAi();
      if (action === "addAiFull") return toast("座位已满，不能继续加入AI");
      if (action.startsWith("kickAi:")) return kickAi(Number(action.split(":")[1]));
      if (action === "leaveTable") return leaveTable();
      if (action === "leaveTableAndClose") return leaveTable(true);
      if (action === "quit") return quitGame();
      if (action === "quitConfirm") return confirmQuitGame();
      if (action === "restart") return restart();
      if (action === "replayOpen") return openReplay();
      if (action === "replayPrev") return refreshReplayPreview(-1);
      if (action === "replayNext") return refreshReplayPreview(1);
      if (action === "replayLast") {
        const id = state.replayView?.[currentPlayer];
        const archive = id && state.replayArchive?.[id];
        return refreshReplayPreview(0, archive?.replay?.steps?.length || 0);
      }
      if (action === "replayJump") return refreshReplayPreview(0, Number($("replayJumpInput")?.value || 0));
      if (action === "exportReplay") return exportReplay();
      if (action.startsWith("bid:")) return bid(Number(action.split(":")[1]));
      if (action.startsWith("card:")) return toggleCard(Number(action.split(":")[1]));
      if (action === "hint") return hintCards();
      if (action === "play") return playCards();
      if (action === "pass") return passCards();
      if (action === "tracker") return openTracker();
      if (action === "trust") return toggleTrust();
      if (action === "testTool") return openTestTool();
      if (action === "allSoundTest") return openAllSoundTest();
      if (action === "testClear") return testClear();
      if (action === "testOverlapApply") return testOverlapApply();
      if (action.startsWith("testOverlap:")) return testOverlap(Number(action.split(":")[1]));
      if (action.startsWith("testRed:")) return testRed(action.split(":")[1]);
      if (action.startsWith("testPick:")) return testPick(Number(action.split(":")[1]));
      if (action.startsWith("testSound:")) return playPreviewSound(action.split(":")[1]);
      if (action === "soundToggle") {
        state.soundEnabled = !state.soundEnabled;
        saveState();
        if (state.soundEnabled) playPreviewSound("gui_switch");
        return render();
      }
      if (action.startsWith("testCard:")) {
      state.uiTest ||= {sel:{}, played:[], overlap:100, redColor:"deep"};
        state.uiTest.overlap ??= 100;
        state.uiTest.redColor ??= "deep";
        const idx = Number(action.split(":")[1]);
        state.uiTest.sel[idx] = !state.uiTest.sel[idx];
        saveState();
        return openTestTool();
      }
      if (action === "rules") return modalRules();
      if (action === "notice") return modalNotice();
      if (action === "stats") return modalStats();
      if (action === "about") return modalAbout();
      if (action === "qr") return modalQr();
      if (action === "discordQr") return modalDiscordQr();
      if (action === "fbSave") return saveFeedback();
      if (action.startsWith("fbDelete:")) return deleteFeedback(Number(action.split(":")[1]));
      if (action === "exportQqQrSvg") return exportQqQrSvg();
      if (action === "exportDiscordQrPng") return exportDiscordQrPng();
      if (action === "exportFeedback") return exportFeedback();
    });

    document.body.addEventListener("input", e => {
      if (e.target?.id !== "replaySlider") return;
      refreshReplayPreview(0, Number(e.target.value || 0), true);
    });

    document.body.addEventListener("keydown", e => {
      if (e.target?.id !== "replayJumpInput" || e.key !== "Enter") return;
      refreshReplayPreview(0, Number(e.target.value || 0));
    });

    let dragState = null;
    document.body.addEventListener("pointerdown", e => {
      if (e.button !== 0) return;
      if (e.target.closest("button,input,textarea,select")) return;
      const bar = e.target.closest(".titlebar");
      if (!bar) return;
      const win = bar.closest(".window,.modal-window");
      if (!win) return;
      const rect = win.getBoundingClientRect();
      win.style.position = "fixed";
      win.style.left = rect.left + "px";
      win.style.top = rect.top + "px";
      win.style.margin = "0";
      win.style.zIndex = String(Date.now()).slice(-6);
      dragState = {
        win,
        dx: e.clientX - rect.left,
        dy: e.clientY - rect.top
      };
      bar.setPointerCapture(e.pointerId);
    });

    document.body.addEventListener("pointermove", e => {
      if (!dragState) return;
      const maxX = Math.max(0, window.innerWidth - dragState.win.offsetWidth);
      const maxY = Math.max(42, window.innerHeight - dragState.win.offsetHeight);
      const x = Math.min(maxX, Math.max(0, e.clientX - dragState.dx));
      const y = Math.min(maxY, Math.max(42, e.clientY - dragState.dy));
      dragState.win.style.left = x + "px";
      dragState.win.style.top = y + "px";
    });

    document.body.addEventListener("pointerup", () => { dragState = null; });
    document.body.addEventListener("pointercancel", () => { dragState = null; });

    $("topBtn").addEventListener("click", () => render());
    $("playerSelect").addEventListener("change", e => {
      currentPlayer = Number(e.target.value);
      render();
    });
    $("addHumanBtn").addEventListener("click", addHuman);
    $("resetBtn").addEventListener("click", () => {
      if (!confirm("确定重置浏览器牌局、战绩和反馈吗？")) return;
      localStorage.removeItem(SAVE_KEY);
      state = freshState();
      currentPlayer = 1;
      closeModal();
      saveAndRender();
    });

    render();
  </script>
</body>
</html>
