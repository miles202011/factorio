rules-target-title=【目标】
rules-target-body=地主先出完手牌则地主胜，任意农民先出完则农民胜。
rules-deal-title=【发牌】
rules-deal-body=54张牌（含大小王），每人17张，底牌3张归地主。
rules-bid-title=【叫地主】
rules-bid-body=依次叫1/2/3分或不叫。叫3分立即成为地主；\n三人均不叫会先提示，再重新发牌；一轮后最高叫分者为地主。
rules-order-title=【出牌顺序】
rules-order-body=地主先出，之后按座位顺序轮流出牌。\n上家出牌后，下家需出更大的同类牌型，或用炸弹/火箭压制。\n连续两人跳过后，出牌者可自由出任意牌型。
rules-types-title=【牌型】
rules-type-single=  单张
rules-type-single-body=任意一张
rules-type-pair=  对子
rules-type-pair-body=两张相同点数
rules-type-triple=  三张
rules-type-triple-body=三张相同点数
rules-type-t1=  三带一
rules-type-t1-body=三张 + 任意单张
rules-type-t2=  三带二
rules-type-t2-body=三张 + 任意一对
rules-type-seq=  顺子
rules-type-seq-body=≥5张连续单张（3~A，不含2和王）
rules-type-pseq=  连对
rules-type-pseq-body=≥3对连续对子（3~A，不含2和王）
rules-type-plane=  飞机
rules-type-plane-body=≥2组连续三张（3~A，不含2）
rules-type-plane1=  飞机带单
rules-type-plane1-body=飞机 + 每组配一张单牌
rules-type-plane2=  飞机带对
rules-type-plane2-body=飞机 + 每组配一对
rules-type-s41=  四带两单
rules-type-s41-body=四张同点 + 任意2张单牌
rules-type-s42=  四带两对
rules-type-s42-body=四张同点 + 任意2对
rules-type-bomb=  炸弹
rules-type-bomb-body=四张相同点数，可压任意非炸弹/火箭牌型
rules-type-rocket=  火箭
rules-type-rocket-body=大王 + 小王，最大牌型，压任意牌
rules-rank-title=【点数大小】
rules-rank-body=大王 > 小王 > 2 > A > K > Q > J > 10 > 9 > 8 > 7 > 6 > 5 > 4 > 3
rules-compare-title=【牌型大小】
rules-compare-body=火箭 > 炸弹 > 同类型比最大点数（张数须相同）
notice-ready-timeout-title=【准备超时】
notice-ready-timeout-body=入座后30秒内未点「准备」，将被自动踢出房间。
notice-bid-timeout-title=【叫分超时】
notice-bid-timeout-body=轮到自己叫分时，30秒内未操作将进入托管，并由AI接管叫分。
notice-play-timeout-title=【出牌超时】
notice-play-timeout-body=轮到自己出牌时，30秒内未操作将进入托管，并由AI接管出牌。
notice-escape-title=【逃跑记录】
notice-escape-body=点击「退出（结束本局）」或游戏中途断线，均视为逃跑并记入战绩。逃跑会强制结束本局，同桌其他玩家不计胜负。\n注意：有AI参与的对局，退出不计逃跑。
notice-stats-title=【战绩计算】
notice-stats-body=仅三位真实玩家完整打完的对局才计入战绩。有AI补位的对局不计战绩。
