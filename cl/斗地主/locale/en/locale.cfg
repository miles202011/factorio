rules-target-title=[Goal]
rules-target-body=The landlord wins by playing all cards first. Farmers win if any farmer plays all cards first.
rules-deal-title=[Deal]
rules-deal-body=54 cards including jokers. Each player gets 17 cards, and 3 bottom cards go to the landlord.
rules-bid-title=[Bidding]
rules-bid-body=Players bid 1/2/3 points or no bid in order. A 3-point bid immediately becomes landlord.\nIf all three pass, the table shows a notice before redealing. Otherwise the highest bidder becomes landlord.
rules-order-title=[Play Order]
rules-order-body=The landlord plays first, then turns proceed by seat order.\nAfter a player plays cards, the next player must play a stronger same-type hand, or beat it with a bomb/rocket.\nAfter two consecutive passes, the last player may play any valid hand.
rules-types-title=[Types]
rules-type-single=  Single
rules-type-single-body=Any one card
rules-type-pair=  Pair
rules-type-pair-body=Two cards of the same rank
rules-type-triple=  Triple
rules-type-triple-body=Three cards of the same rank
rules-type-t1=  Triple + Single
rules-type-t1-body=Triple plus any single card
rules-type-t2=  Triple + Pair
rules-type-t2-body=Triple plus any pair
rules-type-seq=  Straight
rules-type-seq-body=5+ consecutive singles (3-A, excluding 2 and jokers)
rules-type-pseq=  Consecutive Pairs
rules-type-pseq-body=3+ consecutive pairs (3-A, excluding 2 and jokers)
rules-type-plane=  Plane
rules-type-plane-body=2+ consecutive triples (3-A, excluding 2)
rules-type-plane1=  Plane + Singles
rules-type-plane1-body=Plane plus one single card per triple
rules-type-plane2=  Plane + Pairs
rules-type-plane2-body=Plane plus one pair per triple
rules-type-s41=  Four + Two Singles
rules-type-s41-body=Four of a kind plus any 2 single cards
rules-type-s42=  Four + Two Pairs
rules-type-s42-body=Four of a kind plus any 2 pairs
rules-type-bomb=  Bomb
rules-type-bomb-body=Four of a kind; beats any non-bomb/non-rocket hand
rules-type-rocket=  Rocket
rules-type-rocket-body=Big Joker + Small Joker; strongest hand, beats anything
rules-rank-title=[Rank Order]
rules-rank-body=Big Joker > Small Joker > 2 > A > K > Q > J > 10 > 9 > 8 > 7 > 6 > 5 > 4 > 3
rules-compare-title=[Comparison]
rules-compare-body=Rocket > Bomb > same type by highest rank (card count must match)
notice-ready-timeout-title=[Ready Timeout]
notice-ready-timeout-body=If you do not click Ready within 30 seconds after joining a table, you leave automatically.
notice-bid-timeout-title=[Bid Timeout]
notice-bid-timeout-body=If you do not act within 30 seconds on your bidding turn, trustee mode starts and AI bids for you.
notice-play-timeout-title=[Play Timeout]
notice-play-timeout-body=If you do not act within 30 seconds on your play turn, trustee mode starts and AI plays for you.
notice-escape-title=[Escape Record]
notice-escape-body=Clicking "Quit (end this round)" or disconnecting during a game counts as an escape and is recorded in stats. Escaping ends the round; other players at the table do not receive win/loss results.\nNote: games with AI do not count escapes.
notice-stats-title=[Stats]
notice-stats-body=Only complete games with three real players count toward stats. Games with AI substitutes do not count.
